syntax = "proto3";

package proto;

option go_package = "golang_grpc_mysql/proto/uploadv1;uploadv1";


message UserPictureRequest {
  string id = 1;
  bytes file_data = 2;   // Add this to receive the file bytes
  string filename = 3;    // Add this to receive the file extension/name  
}

message UserPictureResponse {
  string text_content = 1;
  string userpicture = 2;
}

service UploadPictureService {
  rpc UploadProfilePicture (UserPictureRequest) returns (UserPictureResponse);
}