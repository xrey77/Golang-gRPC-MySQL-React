syntax = "proto3";

package proto;

option go_package = "golang_grpc_mysql/proto/registerv1;registerv1";

message RegisterData {
    string text_content = 1;
}

message RegisterRequest {
    string firstname = 1;
    string lastname = 2;
    string email = 3;
    string mobile = 4;
    string username = 5;
    string password = 6;
}

message RegisterResponse {
    RegisterData data = 1;
}

service AccountService {
  rpc Register (RegisterRequest) returns (RegisterResponse);
}
