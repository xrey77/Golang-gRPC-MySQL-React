syntax = "proto3";

package proto;

option go_package = "://github.com";

message UserProfile {
  string id = 1;          
  string first_name = 2;  
  string last_name = 3;
  string email = 4;
  string mobile = 5;
  string username = 6;
  string user_pic = 7;
  bool is_active = 8;   
  bool is_blocked = 9;
  string mail_token = 10;
}

message GetUserRequest {
  string id = 1;
}

message GetUserResponse {
  UserProfile user = 1;
}


service UserService {
  rpc GetUser (GetUserRequest) returns (GetUserResponse);
}
