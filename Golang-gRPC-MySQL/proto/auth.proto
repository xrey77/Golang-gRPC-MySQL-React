syntax = "proto3";

package auth;

option go_package = "://github.com";

message LoginMessage {
  string message = 1;
  string first_name = 2;
  string last_name = 3;
  string email = 4;
  string mobile = 5;
  string username = 6;
  string userpic = 7;
  bool isactivate = 8;
  bool is_blocked = 9;
  int32 mailtoken = 10;
  string token = 11;          
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  LoginMessage msg = 1;
}

message RegisterMessage {
    string message = 1;
}

message RegisterRequest {
    string firstname = 1;
    string lastname = 2;
    string email = 3;
    string mobile = 4;
    string username = 5;
    string password = 6;
}

message RegisterResponse {
    RegisterMessage msg = 1;
}

service AuthService {
  rpc Login (LoginRequest) returns (LoginResponse);
  rpc Register (RegisterRequest) returns (RegisterResponse)
}
