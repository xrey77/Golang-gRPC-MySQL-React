syntax = "proto3";

package proto;

option go_package = "://github.com";

message RegisterMessage {
    string message = 1;
}

message RegisterRequest {
    string firstname = 1;
    string lastname = 2;
    string email = 3;
    string mobile = 4;
    string username = 5;
    string password = 6;
}

message RegisterResponse {
    RegisterMessage msg = 1;
}

service RegisterService {
  rpc Register (RegisterRequest) returns (RegisterResponse);
}
