syntax = "proto3";

package proto;

option go_package = "://github.com";

message LoginData {
  string text_content = 1;
  string first_name = 2;
  string last_name = 3;
  string email = 4;
  string mobile = 5;
  string username = 6;
  string user_pic = 7;
  bool is_active = 8;
  bool is_blocked = 9;
  int32 mail_token = 10;
  string token = 11;          
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  LoginData data = 1;
}

service AuthService {
  rpc Login (LoginRequest) returns (LoginResponse);
}
